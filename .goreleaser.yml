version: 2

project_name: stackit-cert-manager-webhook
snapshot:
  version_template: '{{ .Tag }}-SNAPSHOT'

builds:
  - id: stackit-cert-manager-webhook
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./cmd/webhook
    binary: stackit-cert-manager-webhook
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s
      - -w
      - -X 'main.Version={{.Version}}'
      - -X 'main.Gitsha={{.ShortCommit}}'
source:
  enabled: true
archives:
  - formats: ["tar.gz"]
    # this name template makes the OS and Arch compatible with the results of uname.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats: ["zip"]
dockers_v2:
  - images:
      - "{{ .Env.REGISTRY }}/{{ .Env.IMAGE_NAME }}"
    tags:
      - "{{ .Tag }}"
      - "latest"
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      "org.opencontainers.image.title": "{{ .ProjectName }}"
      "org.opencontainers.image.description": "stackit cert manager webhook for dns01 challenges"
      "org.opencontainers.image.url": "https://{{ .Env.GITHUB_SERVER_URL }}/{{ .Env.GITHUB_REPOSITORY}}"
      "org.opencontainers.image.source": "https://{{ .Env.GITHUB_SERVER_URL }}/{{ .Env.GITHUB_REPOSITORY}}"
      "org.opencontainers.image.version": "{{ .Version }}"
      "org.opencontainers.image.created": '{{ time "2006-01-02T15:04:05Z07:00" }}'
      "org.opencontainers.image.revision": "{{ .FullCommit }}"
      "org.opencontainers.image.licenses": "Apache-2.0"

checksum:
  disable: false
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
dist: dist
changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

sboms:
  - artifacts: archive

# sign checksums/archives using Cosign
signs:
  - artifacts: checksum
    cmd: cosign
    certificate: "{artifact}.pem"
    args:
      - "sign-blob"
      - "--output-signature=${signature}"
      - "--bundle=${artifact}.bundle"
      - "--output-certificate=${certificate}"
      - "--yes"
      - "${artifact}"

# sign published Docker images using Cosign
docker_signs:
  - cmd: cosign
    args:
      - "sign"
      - "--yes"
      - "${artifact}"